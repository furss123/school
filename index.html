<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>남악고등학교 1학년 성적 조회 시스템</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

@page {
    size: A4;
    margin: 0;
}

body{
    font-family:'Malgun Gothic',sans-serif;
    background:#f4f6fb;
    margin:0;
    padding:0;
}

/* 메인 박스 */
.search-container{
    max-width:900px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* 제목 */
.main-title{
    margin-top:0;
    color:#3b82f6;
    font-size:28px;
    font-weight:bold;
}

/* 업로드 영역 */
.upload-section{
    margin-top:20px;
    margin-bottom:25px;
}

.upload-box{
    display:flex;
    align-items:center;
    gap:15px;

    padding:20px;

    background:#f8fafc;
    border:2px dashed #cbd5e1;
    border-radius:14px;

    cursor:pointer;
    transition:all 0.25s ease;
}

.upload-box:hover{
    border-color:#3b82f6;
    background:#eff6ff;
}

.upload-box.dragover{
    border-color:#2563eb;
    background:#dbeafe;
    transform:scale(1.01);
}

.upload-box.success{
    border-color:#10b981;
    background:#ecfdf5;
}

.upload-icon{
    width:34px;
    height:34px;
    color:#64748b;
}

.upload-box.success .upload-icon{
    color:#10b981;
}

.upload-text-container{
    display:flex;
    flex-direction:column;
}

.upload-title{
    font-size:15px;
    font-weight:bold;
    color:#334155;
}

.upload-desc{
    font-size:13px;
    color:#64748b;
    margin-top:4px;
}

/* 입력 영역 */
.input-area{
    display:flex;
    gap:12px;
}

input{
    flex:1;
    padding:14px 18px;
    font-size:16px;

    border:1.5px solid #dbe1ea;
    border-radius:10px;

    outline:none;
}

input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 0 3px rgba(59,130,246,0.15);
}

/* 버튼 */
.search-btn{
    padding:14px 28px;

    border:none;
    border-radius:10px;

    background:#3b82f6;
    color:white;

    font-size:15px;
    font-weight:bold;

    cursor:pointer;
    transition:0.2s;
}

.search-btn:hover{
    background:#2563eb;
}

</style>
</head>

<body>

<div class="search-container">

    <!-- 제목 -->
    <h2 class="main-title">
        남악고등학교 1학년 성적 조회 시스템
    </h2>

    <!-- 업로드 영역 -->
    <div class="upload-section">

        <input
            type="file"
            id="excelFile"
            accept=".xlsx,.xls"
            style="display:none;"
            onchange="uploadExcel(this)"
        >

        <div
            class="upload-box"
            id="uploadBox"
            onclick="document.getElementById('excelFile').click()"
        >

            <!-- 아이콘 -->
            <svg
                class="upload-icon"
                id="uploadIcon"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
                />
            </svg>

            <div class="upload-text-container">

                <div class="upload-title" id="uploadTitle">
                    엑셀 성적 파일 등록하기
                </div>

                <div class="upload-desc" id="fileStatus">
                    클릭하거나 파일을 드래그 앤 드롭하여 학생 성적 파일(.xlsx)을 불러와주세요.
                </div>

            </div>
        </div>
    </div>

    <!-- 검색 영역 -->
    <div class="input-area">

        <input
            type="text"
            id="studentId"
            placeholder="학번을 입력하세요 (예: 1416)"
        >

        <button class="search-btn" onclick="searchStudent()">
            조회 및 분석
        </button>

    </div>

</div>

<script>

/* 학생 데이터 */
let studentData = [];

/* 업로드 상태 변경 */
function setUploadState(statusText, isSuccess, fileName = "") {

    const uploadBox = document.getElementById('uploadBox');
    const uploadTitle = document.getElementById('uploadTitle');
    const fileStatus = document.getElementById('fileStatus');

    if(isSuccess){

        uploadBox.classList.add('success');

        uploadTitle.textContent = "성적 데이터 등록 완료";

        fileStatus.textContent =
            `▶ ${fileName} 업로드 완료 (${studentData.length}명)`;

    }else{

        uploadBox.classList.remove('success');

        uploadTitle.textContent = "엑셀 성적 파일 등록하기";

        fileStatus.textContent = statusText;
    }
}

/* 엑셀 업로드 */
function uploadExcel(input){

    const file = input.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){

        try{

            const data = new Uint8Array(e.target.result);

            const workbook = XLSX.read(data, {
                type:'array'
            });

            const firstSheet = workbook.SheetNames[0];

            const worksheet = workbook.Sheets[firstSheet];

            studentData =
                XLSX.utils.sheet_to_json(worksheet);

            if(studentData.length > 0){

                setUploadState(
                    "등록 완료",
                    true,
                    file.name
                );

            }else{

                setUploadState(
                    "엑셀 파일에 데이터가 없습니다.",
                    false
                );
            }

        }catch(error){

            console.error(error);

            setUploadState(
                "파일 읽기 실패",
                false
            );
        }
    };

    reader.readAsArrayBuffer(file);
}

/* 드래그 앤 드롭 */
const uploadBox = document.getElementById('uploadBox');

uploadBox.addEventListener('dragover', (e) => {

    e.preventDefault();

    uploadBox.classList.add('dragover');
});

uploadBox.addEventListener('dragleave', () => {

    uploadBox.classList.remove('dragover');
});

uploadBox.addEventListener('drop', (e) => {

    e.preventDefault();

    uploadBox.classList.remove('dragover');

    const files = e.dataTransfer.files;

    if(
        files.length > 0 &&
        (
            files[0].name.endsWith('.xlsx') ||
            files[0].name.endsWith('.xls')
        )
    ){

        document.getElementById('excelFile').files = files;

        uploadExcel(
            document.getElementById('excelFile')
        );

    }else{

        alert(
            '엑셀 파일(.xlsx, .xls)만 업로드 가능합니다.'
        );
    }
});

/* 학생 검색 */
function searchStudent(){

    if(studentData.length === 0){

        alert('먼저 엑셀 파일을 업로드해주세요.');

        return;
    }

    const studentId =
        document.getElementById('studentId')
        .value
        .trim();

    if(!studentId){

        alert('학번을 입력해주세요.');

        return;
    }

    const student =
        studentData.find(
            s => String(s['학번']) === studentId
        );

    if(!student){

        alert('학생을 찾을 수 없습니다.');

        return;
    }

    alert(
        `${student['이름']} 학생 조회 성공`
    );
}

/* 엔터 검색 */
document
.getElementById('studentId')
.addEventListener('keydown', function(e){

    if(e.key === 'Enter'){

        searchStudent();
    }
});

</script>

</body>
</html>
